<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada | Kenzo Nakagawa</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .nf-wrap {
      min-height: 70vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.25rem;
    }
    .nf-code {
      font-size: clamp(4rem, 16vw, 7rem);
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .nf-msg { color: var(--text-body); margin: 0.8rem 0 1.6rem; }
  </style>
</head>
<body>
  <div class="rings" aria-hidden="true">
    <svg class="rings-svg rings-top" viewBox="0 0 600 600" fill="none">
      <circle cx="300" cy="300" r="120" stroke="currentColor" stroke-width="1.5"/>
      <circle cx="300" cy="300" r="190" stroke="currentColor" stroke-width="1" stroke-dasharray="6 14"/>
      <circle cx="300" cy="300" r="260" stroke="currentColor" stroke-width="1"/>
    </svg>
  </div>
  <main class="nf-wrap">
    <p class="nf-code">404</p>
    <h1>Essa página não existe</h1>
    <p class="nf-msg">O link pode ter mudado ou nunca existiu. O que você procura provavelmente está na página inicial.</p>
    <a class="btn btn-cta" href="/">Voltar para o início</a>
  </main>
</body>
</html>
